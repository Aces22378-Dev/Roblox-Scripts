<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title> About Me</title>
  <!-- Use your name -->
  <style>
    body {
      margin: 0;
      font-family: 'Arial', sans-serif;
      /* Background Image: Replace the URL with your own from a host like imgbb.com */
      background: url('https://i.ibb.co') no-repeat center center fixed; 
      background-size: cover;
      color: #fff;
      text-align: center;
    }

    .overlay {
      /* Darkens the background so text is easier to read */
      background: rgba(0, 0, 0, 0.6);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .pfp {
      /* Profile Picture Styling */
      width: 150px;
      height: 150px;
      border-radius: 50%;
      border: 3px solid #fff;
      margin-bottom: 20px;
      object-fit: cover;
    }

    h1 {
      font-size: 2.5em;
      margin: 0 0 15px 0;
    }

    p {
      font-size: 1.2em;
      max-width: 650px;
      margin-bottom: 25px;
      line-height: 1.5;
    }

    .links a {
      /* Button Styling */
      display: inline-block;
      margin: 10px;
      padding: 10px 20px;
      background: #fff;
      color: #000;
      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;
      transition: 0.3s;
    }

    .links a:hover {
      /* Button Hover Effect */
      background: #ff9900;
      color: #fff;
    }

    button {
      margin-top: 20px;
      padding: 10px 20px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      background: #ff9900;
      color: white;
      cursor: pointer;
    }
  </style>
</head>
<body>

    <p>????</p> <!-- Your Bio  -->
    
    <div class="links">
      <a href="https://www.google.com/" target="_blank">Button</a> <!-- Your Social Links  -->
    </div> </div> </body>
</html>
